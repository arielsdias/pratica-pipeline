name: Controle de Entrega

on:
  push:
    branches:
      - main

jobs:
  validar_usuarios:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Validar serviço de usuários
        run: |
          echo "Validando serviço de usuários"
          test -f service-usuarios/index.html
          grep "Serviço de Usuários" service-usuarios/index.html
          echo "Serviço de usuários validado com sucesso"

  validar_catalogo:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Validar serviço de catálogo
        run: |
          echo "Validando serviço de catálogo"
          test -f service-catalogo/index.html
          grep "Serviço de Catálogo" service-catalogo/index.html
          echo "Serviço de catálogo validado com sucesso"

  gerar_entrega:
    runs-on: ubuntu-latest
    needs:
      - validar_usuarios
      - validar_catalogo

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Exibir versão da entrega
        run: |
          echo "Versão da entrega:"
          cat VERSION

      - name: Criar pacote da entrega
        run: |
          mkdir entrega
          cp -r service-usuarios entrega/
          cp -r service-catalogo entrega/
          cp VERSION entrega/
          zip -r entrega-versionada.zip entrega

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: entrega-versionada
          path: entrega-versionada.zip
